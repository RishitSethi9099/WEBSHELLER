<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vainko Trainer — Sheller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    input { font: inherit; color: inherit; }

    /* ── PALETTE ── */
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --text-muted: #666666;
      --text-dim: #444444;
      --purple: #7c3aed;
      --purple-dim: rgba(124, 58, 237, 0.15);
      --purple-border: rgba(124, 58, 237, 0.3);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.12);
      --mono: 'JetBrains Mono', 'Cascadia Code', monospace;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: row;
    }

    /* ════════════════════════════════════════════
       COLUMN 1 — SIDEBAR (280px)
       ════════════════════════════════════════════ */
    .sidebar {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .sidebar-skill {
      margin-top: 8px;
    }

    .skill-pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .skill-pill.beginner     { background: var(--green-dim); color: var(--green); }
    .skill-pill.intermediate { background: var(--yellow-dim); color: var(--yellow); }
    .skill-pill.experienced  { background: var(--purple-dim); color: var(--purple); }

    .sidebar-section-title {
      padding: 20px 20px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .lesson-list {
      padding: 0 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Lesson Card ── */
    .lesson-card {
      padding: 12px 14px;
      border-radius: 6px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .lesson-card:hover {
      background: rgba(255,255,255,0.03);
    }
    .lesson-card.active {
      background: rgba(124, 58, 237, 0.06);
      border-left-color: var(--purple);
    }

    .lesson-card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }
    .lesson-card-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .lesson-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .difficulty-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .difficulty-pill.beginner     { background: var(--green-dim); color: var(--green); }
    .difficulty-pill.intermediate { background: var(--yellow-dim); color: var(--yellow); }

    .lesson-card-time {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ════════════════════════════════════════════
       COLUMN 2 — LESSON STEPS PANEL (400px)
       ════════════════════════════════════════════ */
    .steps-panel {
      width: 400px;
      min-width: 400px;
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: none;
      flex-direction: column;
    }
    .steps-panel.visible {
      display: flex;
    }

    .steps-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .steps-lesson-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* Progress bar */
    .steps-progress {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .steps-progress-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .steps-progress-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Step list */
    .steps-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .steps-list::-webkit-scrollbar { width: 4px; }
    .steps-list::-webkit-scrollbar-track { background: transparent; }
    .steps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border-radius: 6px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .step-item:hover {
      background: rgba(255,255,255,0.02);
    }
    .step-item.active {
      background: rgba(124, 58, 237, 0.06);
      border-left-color: var(--purple);
    }

    .step-checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-dim);
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .step-item.done .step-checkbox {
      border-color: var(--purple);
      background: var(--purple);
    }
    .step-item.done .step-checkbox::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
    }

    .step-content { flex: 1; }
    .step-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
    }
    .step-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .step-item.done .step-title { color: var(--text-muted); }
    .step-item.done .step-desc  { color: var(--text-dim); }

    /* Ask button */
    .steps-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ask-step-btn {
      width: 100%;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      background: var(--purple-dim);
      border: 1px solid var(--purple-border);
      border-radius: 6px;
      transition: background 0.15s;
      cursor: pointer;
    }
    .ask-step-btn:hover {
      background: rgba(124, 58, 237, 0.25);
    }

    /* Lesson complete state */
    .lesson-complete {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px;
    }
    .lesson-complete.visible { display: flex; }
    .lesson-complete-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--purple-dim);
      border: 2px solid var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lesson-complete-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--purple);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .lesson-complete-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .lesson-complete-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ════════════════════════════════════════════
       COLUMN 3 — CHAT (flex-1)
       ════════════════════════════════════════════ */
    .chat-column {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Top bar */
    .chat-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
    .chat-wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Message bubbles */
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      border-radius: 8px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(124, 58, 237, 0.2);
      color: var(--text);
      border-bottom-right-radius: 2px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 2px;
    }

    /* CMD chips */
    .cmd-chip {
      display: inline-block;
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      vertical-align: baseline;
    }
    .cmd-chip:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      border-bottom-left-radius: 2px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Input bar */
    .chat-inputbar {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-inputbar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-inputbar input::placeholder {
      color: var(--text-dim);
    }
    .chat-inputbar input:focus {
      border-color: var(--purple-border);
    }
    .chat-inputbar button {
      padding: 10px 18px;
      font-size: 12px;
      font-weight: 600;
      background: var(--purple);
      color: #fff;
      border-radius: 6px;
      transition: opacity 0.15s;
    }
    .chat-inputbar button:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- COLUMN 1 — SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">VAINKO</div>
      <div class="sidebar-skill">
        <span class="skill-pill" id="sidebar-skill-pill"></span>
      </div>
    </div>
    <div class="sidebar-section-title">Lessons</div>
    <div class="lesson-list" id="lesson-list"></div>
  </aside>

  <!-- COLUMN 2 — STEPS PANEL -->
  <section class="steps-panel" id="steps-panel">
    <div class="steps-header">
      <div class="steps-lesson-title" id="steps-title"></div>
      <div class="steps-progress"><div class="steps-progress-fill" id="steps-progress-fill"></div></div>
      <div class="steps-progress-label" id="steps-progress-label">0 / 0 steps</div>
    </div>
    <div class="steps-list" id="steps-list"></div>
    <div class="lesson-complete" id="lesson-complete">
      <div class="lesson-complete-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="lesson-complete-text">Lesson Complete</div>
      <div class="lesson-complete-sub">All steps finished. Pick another lesson or keep exploring.</div>
    </div>
    <div class="steps-footer" id="steps-footer">
      <button class="ask-step-btn" id="ask-step-btn" onclick="askAboutCurrentStep()">Ask Vainko about this step</button>
    </div>
  </section>

  <!-- COLUMN 3 — CHAT -->
  <main class="chat-column">
    <div class="chat-topbar">
      <div class="chat-topbar-left">
        <a href="/" class="back-link">&larr; Back</a>
        <span class="chat-wordmark">Vainko</span>
      </div>
      <span class="skill-pill" id="topbar-skill-pill"></span>
    </div>
    <div class="chat-messages" id="vainko-messages"></div>
    <div class="chat-inputbar">
      <input type="text" id="vainko-input" placeholder="Ask Vainko..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </main>

  <script>
    // ═══════════════════════════════════════════════════════
    //  DATA
    // ═══════════════════════════════════════════════════════

    const skillLevel = localStorage.getItem('sheller_skill_level') || 'beginner';

    const LESSONS = {
      navigation: {
        title: 'Navigation',
        desc: 'Move around the filesystem with confidence',
        difficulty: 'beginner',
        time: '~8 min',
        steps: [
          { title: 'Understanding the filesystem structure', desc: 'The Linux directory tree and how it is organized' },
          { title: 'Moving between directories with cd', desc: 'Change your current working directory' },
          { title: 'Listing contents with ls and flags', desc: 'View files and directories with useful options' },
          { title: 'Understanding absolute vs relative paths', desc: 'Two ways to reference any location on disk' },
          { title: 'Using pwd and tab completion', desc: 'Know where you are and type less' },
        ]
      },
      permissions: {
        title: 'Permissions',
        desc: 'Control who can read, write, and execute files',
        difficulty: 'beginner',
        time: '~10 min',
        steps: [
          { title: 'Understanding rwx notation', desc: 'The three permission types and what they mean' },
          { title: 'Reading permission strings', desc: 'Decode the output of ls -l' },
          { title: 'Using chmod with numbers', desc: 'Set permissions using octal notation' },
          { title: 'Using chmod with symbols', desc: 'Add or remove permissions with u/g/o and +/-' },
          { title: 'Changing ownership with chown', desc: 'Transfer file ownership between users and groups' },
        ]
      },
      networking: {
        title: 'Networking',
        desc: 'Inspect and troubleshoot network connections',
        difficulty: 'intermediate',
        time: '~12 min',
        steps: [
          { title: 'Checking your IP with ip addr', desc: 'View your network interfaces and addresses' },
          { title: 'Testing connectivity with ping', desc: 'Verify if a host is reachable' },
          { title: 'Scanning with nmap basics', desc: 'Discover open ports on a target' },
          { title: 'Checking open ports with netstat', desc: 'See which services are listening locally' },
          { title: 'Transferring files with curl and wget', desc: 'Download files and make HTTP requests' },
        ]
      },
      'kali-tools': {
        title: 'Kali Tools',
        desc: 'Essential security tools in Kali Linux',
        difficulty: 'intermediate',
        time: '~15 min',
        steps: [
          { title: 'Nmap port scanning', desc: 'Scan targets for open ports and services' },
          { title: 'Nikto web scanner', desc: 'Check web servers for common vulnerabilities' },
          { title: 'John the Ripper basics', desc: 'Crack password hashes offline' },
          { title: 'Hydra brute force', desc: 'Test login credentials against services' },
          { title: 'Dirb directory enumeration', desc: 'Discover hidden directories on web servers' },
        ]
      },
      scripting: {
        title: 'Scripting',
        desc: 'Automate tasks with bash scripts',
        difficulty: 'intermediate',
        time: '~12 min',
        steps: [
          { title: 'Writing your first bash script', desc: 'Create and run a .sh file from scratch' },
          { title: 'Variables and input', desc: 'Store values and read user input' },
          { title: 'Conditionals with if/else', desc: 'Make decisions in your scripts' },
          { title: 'Loops with for and while', desc: 'Repeat actions over lists or conditions' },
          { title: 'Making scripts executable', desc: 'Use chmod and shebangs correctly' },
        ]
      },
      packages: {
        title: 'Package Management',
        desc: 'Install, update, and remove software',
        difficulty: 'beginner',
        time: '~8 min',
        steps: [
          { title: 'Understanding apt', desc: 'The default package manager on Debian-based systems' },
          { title: 'Updating package lists', desc: 'Keep your package index current' },
          { title: 'Installing and removing packages', desc: 'Add and remove software from the system' },
          { title: 'Searching for packages', desc: 'Find packages by name or description' },
          { title: 'Understanding dpkg', desc: 'Work with .deb packages directly' },
        ]
      }
    };

    // ═══════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════
    let activeLesson = null;
    let activeStepIndex = 0;
    let completedSteps = {}; // { lessonId: Set<index> }

    // ═══════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════
    (function init() {
      // Skill pills
      const skillText = skillLevel === 'experienced' ? 'Experienced'
                      : skillLevel === 'intermediate' ? 'Intermediate'
                      : 'Beginner';
      document.getElementById('sidebar-skill-pill').className = 'skill-pill ' + skillLevel;
      document.getElementById('sidebar-skill-pill').textContent = skillText;
      document.getElementById('topbar-skill-pill').className = 'skill-pill ' + skillLevel;
      document.getElementById('topbar-skill-pill').textContent = skillText;

      // Render lesson cards
      const listEl = document.getElementById('lesson-list');
      for (const [id, lesson] of Object.entries(LESSONS)) {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.dataset.lessonId = id;
        card.onclick = () => selectLesson(id);
        card.innerHTML =
          '<div class="lesson-card-title">' + lesson.title + '</div>' +
          '<div class="lesson-card-desc">' + lesson.desc + '</div>' +
          '<div class="lesson-card-meta">' +
            '<span class="difficulty-pill ' + lesson.difficulty + '">' + (lesson.difficulty === 'beginner' ? 'Beginner' : 'Intermediate') + '</span>' +
            '<span class="lesson-card-time">' + lesson.time + '</span>' +
          '</div>';
        listEl.appendChild(card);
      }

      // Greeting
      appendMsg('assistant', 'Select a lesson from the sidebar, or ask a question directly.');
    })();

    // ═══════════════════════════════════════════════════════
    //  LESSON SELECTION
    // ═══════════════════════════════════════════════════════
    function selectLesson(id) {
      activeLesson = id;
      activeStepIndex = 0;
      if (!completedSteps[id]) completedSteps[id] = new Set();

      // Highlight sidebar card
      document.querySelectorAll('.lesson-card').forEach(c => c.classList.remove('active'));
      const card = document.querySelector('.lesson-card[data-lesson-id="' + id + '"]');
      if (card) card.classList.add('active');

      // Show steps panel
      document.getElementById('steps-panel').classList.add('visible');

      renderSteps();
    }

    function renderSteps() {
      const lesson = LESSONS[activeLesson];
      if (!lesson) return;
      const done = completedSteps[activeLesson] || new Set();
      const total = lesson.steps.length;
      const doneCount = done.size;

      // Title + progress
      document.getElementById('steps-title').textContent = lesson.title;
      document.getElementById('steps-progress-fill').style.width = ((doneCount / total) * 100) + '%';
      document.getElementById('steps-progress-label').textContent = doneCount + ' / ' + total + ' steps';

      // Complete state
      const completeEl = document.getElementById('lesson-complete');
      const listEl = document.getElementById('steps-list');
      const footerEl = document.getElementById('steps-footer');

      if (doneCount === total) {
        completeEl.classList.add('visible');
        listEl.style.display = 'none';
        footerEl.style.display = 'none';
        return;
      } else {
        completeEl.classList.remove('visible');
        listEl.style.display = 'flex';
        footerEl.style.display = 'block';
      }

      // Steps
      listEl.innerHTML = '';
      lesson.steps.forEach(function(step, i) {
        const item = document.createElement('div');
        const isDone = done.has(i);
        const isActive = i === activeStepIndex && !isDone;
        item.className = 'step-item' + (isDone ? ' done' : '') + (isActive ? ' active' : '');
        item.onclick = function() { clickStep(i); };
        item.innerHTML =
          '<div class="step-checkbox"></div>' +
          '<div class="step-content">' +
            '<div class="step-title">' + (i + 1) + '. ' + step.title + '</div>' +
            '<div class="step-desc">' + step.desc + '</div>' +
          '</div>';
        listEl.appendChild(item);
      });
    }

    function clickStep(index) {
      activeStepIndex = index;
      const lesson = LESSONS[activeLesson];
      const step = lesson.steps[index];

      // Mark as done
      if (!completedSteps[activeLesson]) completedSteps[activeLesson] = new Set();
      completedSteps[activeLesson].add(index);

      renderSteps();

      // Auto send to chat
      var msg = "I'm on step " + (index + 1) + " of " + lesson.title + ": " + step.title + ". Teach me this.";
      sendToChat(msg);
    }

    function askAboutCurrentStep() {
      if (!activeLesson) return;
      clickStep(activeStepIndex);
    }

    // ═══════════════════════════════════════════════════════
    //  CHAT — messages
    // ═══════════════════════════════════════════════════════
    function appendMsg(role, content) {
      var container = document.getElementById('vainko-messages');
      var div = document.createElement('div');
      div.className = 'msg ' + role;
      var processed = content.replace(/\[CMD:\s*(.*?)\]/g, function(_, cmd) {
        var trimmed = cmd.trim();
        var escaped = trimmed.replace(/'/g, "\\'");
        return '<span class="cmd-chip" onclick="navigator.clipboard.writeText(\'' + escaped + '\')" title="Click to copy">' + trimmed + '</span>';
      });
      div.innerHTML = processed;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      var container = document.getElementById('vainko-messages');
      var div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'vainko-typing';
      div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      var t = document.getElementById('vainko-typing');
      if (t) t.remove();
    }

    // ═══════════════════════════════════════════════════════
    //  CHAT — API calls (preserved logic)
    // ═══════════════════════════════════════════════════════
    async function sendMessage() {
      var input = document.getElementById('vainko-input');
      var message = input.value.trim();
      if (!message) return;
      input.value = '';
      sendToChat(message);
    }

    async function sendToChat(message) {
      appendMsg('user', message);
      showTyping();

      try {
        const res = await fetch('/api/vainko', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message, os: 'linux', skill: skillLevel }),
        });
        const data = await res.json();
        removeTyping();
        appendMsg('assistant', data.reply || data.error || 'No response.');
      } catch (err) {
        removeTyping();
        appendMsg('assistant', 'Error contacting Vainko.');
      }
    }
  </script>
</body>
</html>
